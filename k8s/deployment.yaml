apiVersion: v1
kind: ConfigMap
metadata:
  name: resilientercho-config
  namespace: default
data:
  NODE_ENV: production
  CORS_ORIGINS: "https://resilientercho.io"

---

apiVersion: v1
kind: Secret
metadata:
  name: resilientercho-secrets
  namespace: default
type: Opaque
stringData:
  JWT_SECRET: "base64-encoded-256bit-key-change-in-production"
  JWT_REFRESH_SECRET: "base64-encoded-256bit-key-change-in-production"
  DATABASE_URL: "postgresql://resilient:PASSWORD@postgres-service:5432/resilientercho"
  REDIS_HOST: "redis-service"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: resilienterecho-api
  namespace: default
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: resilientercho-api
  template:
    metadata:
      labels:
        app: resilientercho-api
    spec:
      containers:
      - name: api
        image: resilientercho:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: resilientercho-config
        - secretRef:
            name: resilientercho-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000

---

apiVersion: v1
kind: Service
metadata:
  name: resilientercho-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: resilientercho-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3001

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: resilientercho-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: resilienterecho-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: resilientercho-network-policy
spec:
  podSelector:
    matchLabels:
      app: resilientercho-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: default
    ports:
    - protocol: TCP
      port: 3001
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: default
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 53
